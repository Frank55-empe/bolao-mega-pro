name: Deploy para GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        run: npm run build

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        }
function DIAGNOSTICO_CONCURSOS() {
  const planilha = SpreadsheetApp.getActiveSpreadsheet();
  const abaConcursos = planilha.getSheetByName('CONCURSOS');
  const linhasBrutas = abaConcursos.getDataRange().getValues();

  const listado = listarConcursos();
  const ativo = obterConcursoAtivo();

  const abaConfig = planilha.getSheetByName('CONFIG');
  abaConfig.getRange('D3').setValue('BRUTO: ' + JSON.stringify(linhasBrutas));
  abaConfig.getRange('D4').setValue('LISTADO: ' + JSON.stringify(listado));
  abaConfig.getRange('D5').setValue('ATIVO: ' + JSON.stringify(ativo));
}
